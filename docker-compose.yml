version: '3.8'

services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: giresearch
      POSTGRES_USER: giresearch
      POSTGRES_PASSWORD: giresearch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giresearch -d giresearch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env  # Loads your NCBI, GROQ, and LLM keys
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Internal Docker networking uses the service name 'postgres'
      DATABASE_URL: postgresql://giresearch:giresearch@postgres:5432/giresearch
      MEDGEMMA_BACKEND: ${MEDGEMMA_BACKEND:-ollama}
      OLLAMA_HOST: http://host.docker.internal:11434  
      OLLAMA_MODEL: "medgemma-gi"
      # Paths relative to the WORKDIR (/app) inside the container
      PUBMED_PICO_JSONL: data/pubmed_pico_results.jsonl
      CDC_CSV: data/CDC_Mortality_Cleaned_1999_2024.csv
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
    extra_hosts:
      - "host.docker.internal:host-gateway" # Required for Mac-to-Ollama comms
    volumes:
      - ./backend:/app          # Maps your code for live-reloading
      - ./backend/data:/app/data # Maps your MASLD/CDC data specifically
    ports:
      - "8000:8000"

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules # Anonymous volume to prevent local override of modules
    ports:
      - "3000:80"      
      - "5173:5173"    
    environment:
      # - VITE_API_BASE=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true 
      - WATCHPACK_POLLING=true

  # ── Database Management (pgAdmin) ───────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gi-research-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@riaz.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin-data: