version: '3.8'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: giresearch
      POSTGRES_USER: giresearch
      POSTGRES_PASSWORD: giresearch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giresearch -d giresearch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped # 👈 Fixed indentation (was inside 'build')
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://giresearch:giresearch@postgres:5432/giresearch
      NCBI_API_KEY: ${NCBI_API_KEY:-}
      MEDGEMMA_BACKEND: ${MEDGEMMA_BACKEND:-ollama}
      # 🚀 Use host.docker.internal to access Ollama on your Mac
      OLLAMA_HOST: http://host.docker.internal:11434  
      OLLAMA_MODEL: "medgemma-gi"
      PUBMED_PICO_JSONL: /data/pubmed_pico_results.jsonl
      CDC_CSV: /data/CDC_Mortality_Cleaned_1999_2024.csv
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
    extra_hosts:
      - "host.docker.internal:host-gateway" # 👈 Required for Mac-to-Container comms
    volumes:
      - ./data:/data:rw
      - ./backend:/app
    ports:
      - "8000:8000"

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules 
    ports:
      - "3000:80"      
      - "5173:5173"    
    environment:
      - VITE_API_BASE=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true 
      - WATCHPACK_POLLING=true

  # ── Ollama (Local AI) ───────────────────────────────────────────────────────
  # NOTE: Keep this only if you want a separate containerized Ollama. 
  # If you are using the Mac Desktop App, your backend already points to it via 'host.docker.internal'.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # No ports needed if backend uses host.docker.internal, 
    # but kept for CLI access.

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gi-research-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@riaz.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  postgres_data:
  ollama_data:
  pgadmin-data: